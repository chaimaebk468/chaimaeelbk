version: '3.8'

services:
  app:
    build: .
    container_name: chaimaeelbk-bookshop-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://host.docker.internal:3306/bookshop?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET=${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped